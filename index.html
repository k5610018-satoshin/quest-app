<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学びの冒険クエスト</title>
  <link rel="stylesheet" href="css/styles.css?v=28">
  <link rel="preload" href="assets/heart-matrix.png" as="image">
</head>
<body>
  <!-- ローディングオーバーレイ -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">読み込み中...</div>
  </div>

  <!-- トースト通知 -->
  <div id="toast" class="toast"></div>

  <!-- 出席番号選択画面 -->
  <div id="screen-select" class="screen active">
    <div class="select-screen">
      <h1 class="app-title">⚔️ 学びの冒険クエスト</h1>
      <p class="app-subtitle">先生からもらったリンクを使ってね</p>
      <p class="app-note">リンクが分からない場合は、下の番号からもアクセスできます。<br>データはサーバーに保存されています。端末が変わっても大丈夫！</p>
      <div class="number-grid" id="number-grid"></div>
    </div>
  </div>

  <!-- ホーム画面 -->
  <div id="screen-home" class="screen"></div>

  <!-- 日記画面 -->
  <div id="screen-diary" class="screen"></div>

  <!-- 振り返り画面 -->
  <div id="screen-reflection" class="screen"></div>

  <!-- スキルツリー画面 -->
  <div id="screen-skill-tree" class="screen"></div>

  <!-- 今週の大分析画面 -->
  <div id="screen-weekly" class="screen"></div>

  <!-- コレクション図鑑画面 -->
  <div id="screen-collection" class="screen"></div>

  <!-- マイページ画面 -->
  <div id="screen-mypage" class="screen"></div>

  <!-- JavaScript (1ファイルに結合済み = HTTPリクエスト1回) -->
  <script src="js/bundle.js?v=28"></script>

  <script>
    // 出席番号グリッドを生成
    (function() {
      const grid = document.getElementById('number-grid');
      for (let i = 1; i <= 40; i++) {
        const btn = document.createElement('button');
        btn.className = 'number-btn';
        btn.textContent = i;
        btn.onclick = () => App.loginByNumber(i);
        grid.appendChild(btn);
      }
    })();
  </script>
</body>
</html>
