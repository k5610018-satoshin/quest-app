<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理画面 - 学びの冒険クエスト</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#6366f1;--primary-light:#818cf8;--primary-dark:#4f46e5;--bg:#f8fafc;--card:#fff;--text:#1e293b;--text2:#64748b;--border:#e2e8f0;--danger:#ef4444;--success:#22c55e;--warning:#f59e0b;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
a{color:var(--primary);text-decoration:none}

/* Header - compact */
.header{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(99,102,241,.3)}
.header h1{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
.header-actions{display:flex;align-items:center;gap:10px}
.header-actions .status{font-size:11px;opacity:.8}
.btn{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-white{background:#fff;color:var(--primary)}
.btn-white:hover{background:#eef2ff}
.btn-sm{padding:3px 8px;font-size:11px;border-radius:5px}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text2)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}

/* Tabs - compact */
.tabs{display:flex;background:#fff;border-bottom:1px solid var(--border);overflow-x:auto;padding:0 8px}
.tab{padding:7px 12px;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.tab:hover{color:var(--primary)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.tab .badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:9px;font-size:10px;font-weight:700;margin-left:4px}
.tab .badge-red{background:var(--danger);color:#fff}
.tab .badge-gray{background:#e2e8f0;color:var(--text2)}

/* Content */
.content{padding:10px 16px;max-width:1600px;margin:0 auto}

/* Cards */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.card-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-body{padding:14px}

/* Grid */
.grid-2{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.grid-4{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}

/* Dashboard student cards */
.student-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:12px;cursor:pointer;transition:all .15s;border:2px solid transparent}
.student-card:hover{border-color:var(--primary-light);transform:translateY(-1px);box-shadow:0 4px 12px rgba(99,102,241,.15)}
.student-card.selected{border-color:var(--primary);background:#eef2ff}
.student-card .sc-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.student-card .sc-num{width:28px;height:28px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px}
.student-card .sc-name{font-weight:700;font-size:13px}
.student-card .sc-lv{font-size:11px;color:var(--primary);font-weight:600}
.student-card .sc-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;font-size:11px;color:var(--text2)}
.student-card .sc-stats span{text-align:center}
.student-card .sc-stats .val{font-weight:700;font-size:14px;color:var(--text);display:block}
.student-card .sc-streak{display:flex;align-items:center;gap:4px;font-size:11px;margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}
.student-card .sc-streak.hot{color:var(--warning)}
.student-card .sc-streak.cold{color:var(--text2)}

/* Compact data table */
.data-table{width:100%;border-collapse:collapse;font-size:12px;line-height:1.4}
.data-table th{background:#f1f5f9;padding:4px 6px;text-align:left;font-weight:600;color:var(--text2);border-bottom:2px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:10;font-size:11px}
.data-table th.sortable{cursor:pointer;user-select:none}
.data-table th.sortable:hover{color:var(--primary);background:#e8ecf4}
.data-table td{padding:3px 6px;border-bottom:1px solid var(--border);vertical-align:top}
.data-table tr:hover td{background:#f8fafc}
.data-table .col-date{width:70px;white-space:nowrap;color:var(--text2)}
.data-table .col-name{width:80px;white-space:nowrap;font-weight:600}
.data-table .col-content{word-break:break-word;white-space:pre-wrap}
.data-table .col-comment{font-size:11px;color:#92400e;max-width:200px;word-break:break-word}
.data-table .col-subject{width:50px;white-space:nowrap;font-weight:600;color:var(--primary)}
.data-table .col-type{width:60px;font-size:11px;color:var(--text2)}
.data-table .col-plan{max-width:180px;word-break:break-word;color:#166534;font-size:11px}
.data-table .col-zone{width:70px;white-space:nowrap}
.data-table .col-check{width:28px;text-align:center}
.data-table .col-check input{cursor:pointer}
.data-table .inline-comment{display:flex;align-items:center;gap:4px}
.data-table .inline-comment input{flex:1;padding:2px 4px;border:1px solid var(--border);border-radius:4px;font-size:11px;font-family:inherit;min-width:0}
.data-table .inline-comment input:focus{outline:none;border-color:var(--primary)}
.data-table .inline-comment button{padding:1px 6px;font-size:10px;border:1px solid var(--border);border-radius:3px;background:#fff;cursor:pointer;white-space:nowrap}
.data-table .inline-comment button:hover{border-color:var(--primary);color:var(--primary)}
.data-table .inline-comment .saved{color:var(--success);font-size:10px;font-weight:600;display:none}
.sort-arrow{font-size:10px;margin-left:2px}

/* Zone badge - smaller */
.zone-badge{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:4px;font-size:11px;font-weight:600}
.zone-comfort{background:#dbeafe;color:#1d4ed8}
.zone-stretch{background:#dcfce7;color:#15803d}
.zone-panic{background:#fee2e2;color:#b91c1c}

/* Subject chips */
.chip-bar{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.chip{padding:3px 10px;border-radius:16px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--text2);transition:all .15s}
.chip:hover{border-color:var(--primary-light)}
.chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* Filter bar */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.filter-bar select,.filter-bar input{padding:4px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:12px;background:#fff;color:var(--text)}
.filter-bar select:focus,.filter-bar input:focus{outline:none;border-color:var(--primary)}
.active-filter{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:#eef2ff;border-radius:6px;font-size:12px;font-weight:600;color:var(--primary)}
.active-filter button{background:none;border:none;color:var(--primary);cursor:pointer;font-size:14px;line-height:1}

/* Missing list */
.missing-section{margin-bottom:16px}
.missing-section h3{font-size:14px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.missing-grid{display:flex;flex-wrap:wrap;gap:6px}
.missing-chip{padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;background:#fee2e2;color:#b91c1c;border:1px solid #fecaca}

/* Token table */
.token-table{width:100%;border-collapse:collapse;font-size:12px}
.token-table th{background:#f8fafc;padding:6px 10px;text-align:left;font-weight:600;color:var(--text2);border-bottom:2px solid var(--border)}
.token-table td{padding:6px 10px;border-bottom:1px solid var(--border)}
.token-table tr:hover td{background:#f8fafc}
.token-url{font-family:'Courier New',monospace;font-size:11px;color:var(--text2);max-width:400px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}
.copy-btn{padding:3px 8px;font-size:10px;border:1px solid var(--border);border-radius:5px;background:#fff;cursor:pointer;transition:all .15s}
.copy-btn:hover{border-color:var(--primary);color:var(--primary)}
.copy-btn.copied{background:var(--success);color:#fff;border-color:var(--success)}

/* Stats row */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:12px}
.stat-box{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:10px;text-align:center}
.stat-box .stat-val{font-size:24px;font-weight:800;color:var(--primary)}
.stat-box .stat-label{font-size:11px;color:var(--text2);margin-top:2px}

/* Newsletter tab */
.newsletter-section{margin-bottom:16px}
.newsletter-section h3{font-size:14px;font-weight:700;margin-bottom:8px}
.newsletter-actions{display:flex;gap:8px;margin-bottom:12px}
.newsletter-empty{color:var(--text2);text-align:center;padding:30px;font-size:13px}
.checked-row{background:#fffbeb}

/* Print */
.print-area{display:none}
@media print{
  body>*:not(.print-area){display:none!important}
  .print-area{display:block!important;padding:20px;font-size:12px}
  .print-area h2{font-size:16px;margin-bottom:10px;border-bottom:2px solid #333;padding-bottom:4px}
  .print-entry{margin-bottom:12px;page-break-inside:avoid;border:1px solid #ccc;padding:8px;border-radius:4px}
  .print-entry .pe-header{display:flex;justify-content:space-between;font-weight:700;margin-bottom:4px;font-size:11px}
  .print-entry .pe-body{font-size:12px;line-height:1.6;white-space:pre-wrap}
  .print-entry .pe-comment{margin-top:6px;padding:4px 8px;background:#fef3c7;font-size:11px;border-radius:4px}
}

/* JSON area */
.json-area{width:100%;min-height:400px;font-family:'Courier New',monospace;font-size:12px;padding:16px;border:1.5px solid var(--border);border-radius:8px;background:#1e293b;color:#e2e8f0;resize:vertical}

/* Loading */
.loading-bar{position:fixed;top:0;left:0;width:100%;height:3px;z-index:200;display:none}
.loading-bar.active{display:block}
.loading-bar::after{content:'';display:block;height:100%;background:var(--primary);animation:loading 1.2s ease infinite}
@keyframes loading{0%{width:0}50%{width:70%}100%{width:100%;opacity:0}}
.spinner{display:inline-block;width:18px;height:18px;border:2.5px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;padding:10px 16px;border-radius:8px;font-size:12px;font-weight:600;color:#fff;z-index:300;transform:translateY(100px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.toast-success{background:var(--success)}
.toast-error{background:var(--danger)}

/* Entry cards (card-based view for reflections) */
.entry-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:12px;margin-bottom:10px}
.entry-card .ec-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.entry-card .ec-name{font-weight:700;font-size:13px}
.entry-card .ec-date{font-size:11px;color:var(--text2)}
.entry-card .ec-meta{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.entry-card .ec-content{font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word;padding:6px 0}
.entry-card .ec-star{padding:4px 8px;background:#fff7ed;border-radius:6px;font-size:13px;color:#c2410c;border-left:3px solid #fb923c;margin-top:4px}
.entry-card .ec-star.triple{background:linear-gradient(135deg,#fef3c7,#fde68a);color:#b45309;border-left-color:#f59e0b;font-weight:700}
.entry-card .ec-comment-area{margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.entry-card .ec-existing{font-size:12px;color:#92400e;padding:4px 8px;background:#fef3c7;border-radius:6px;margin-bottom:6px}
.entry-card .ec-input-row{display:flex;gap:6px}
.entry-card .ec-input-row textarea{flex:1;padding:6px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit;resize:vertical;min-height:32px}
.entry-card .ec-input-row textarea:focus{outline:none;border-color:var(--primary)}
.entry-card .ec-input-row button{padding:6px 14px;border:none;border-radius:6px;background:var(--primary);color:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.entry-card .ec-input-row button:hover{background:var(--primary-dark)}
.entry-card .ec-saved{color:var(--success);font-size:11px;font-weight:600;margin-top:2px;display:none}
.entry-card .ec-zone{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:4px;font-size:11px;font-weight:600;margin-left:4px}
.entry-card .ec-checkbox{margin-right:8px}

/* View toggle */
.view-toggle{display:flex;gap:4px;margin-bottom:8px}
.view-toggle button{padding:4px 10px;border:1.5px solid var(--border);border-radius:6px;background:#fff;font-size:11px;cursor:pointer;color:var(--text2)}
.view-toggle button.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* Proxy form */
.proxy-form{max-width:600px}
.proxy-form .field{margin-bottom:12px}
.proxy-form .field label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:4px}
.proxy-form .field select,.proxy-form .field input,.proxy-form .field textarea{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit}
.proxy-form .field select:focus,.proxy-form .field input:focus,.proxy-form .field textarea:focus{outline:none;border-color:var(--primary)}
.proxy-form .field textarea{min-height:100px;resize:vertical}
.proxy-form .type-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}

/* Matrix visualization */
.matrix-card{position:relative;width:180px;height:180px;display:inline-block}
.matrix-card img{width:100%;height:100%;border-radius:8px}
.matrix-card canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.matrix-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.matrix-item{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:10px;text-align:center}
.matrix-item .mi-head{font-size:11px;font-weight:600;margin-bottom:4px;display:flex;justify-content:space-between}
.matrix-item .mi-trail{font-size:10px;color:var(--text2);margin-top:4px;word-break:break-word}
.zone-chip{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;margin:2px}
.zone-chip.z-pos{background:#dcfce7;color:#15803d}
.zone-chip.z-neg{background:#fee2e2;color:#b91c1c}
.zone-chip.z-mid{background:#dbeafe;color:#1d4ed8}

/* Student detail page */
.student-detail-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.student-detail-header .sd-num{width:40px;height:40px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px}
.student-detail-header .sd-info h2{font-size:16px;font-weight:700}
.student-detail-header .sd-info span{font-size:12px;color:var(--text2)}

/* Responsive */
@media(max-width:768px){
  .content{padding:8px}
  .header{padding:6px 10px}
  .header h1{font-size:13px}
  .tabs{padding:0 4px}
  .tab{padding:6px 8px;font-size:11px}
  .grid-4{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
  .data-table{font-size:11px}
}
</style>
</head>
<body>

<div class="loading-bar" id="loadingBar"></div>

<div class="header">
  <h1>📊 管理画面</h1>
  <div class="header-actions">
    <span class="status" id="lastUpdate"></span>
    <button class="btn btn-white" onclick="refreshAll()">🔄 更新</button>
  </div>
</div>

<div class="tabs" id="tabBar">
  <div class="tab active" data-tab="dashboard">ダッシュボード</div>
  <div class="tab" data-tab="diary">📝 日記</div>
  <div class="tab" data-tab="reflection">🔄 振り返り</div>
  <div class="tab" data-tab="matrix">🌍 心マトリクス</div>
  <div class="tab" data-tab="analysis">📊 大分析</div>
  <div class="tab" data-tab="proxy">✍️ 代筆</div>
  <div class="tab" data-tab="newsletter">📰 通信用 <span class="badge badge-gray" id="newsletterBadge" style="display:none">0</span></div>
  <div class="tab" data-tab="missing">未提出 <span class="badge badge-red" id="missingBadge">0</span></div>
  <div class="tab" data-tab="pdf">PDF出力</div>
  <div class="tab" data-tab="tokens">トークン</div>
  <div class="tab" data-tab="export">データ出力</div>
</div>

<div class="content" id="mainContent"></div>

<div id="toast" class="toast"></div>
<div class="print-area" id="printArea"></div>

<script>
// ============================================================
// Supabase Config
// ============================================================
const SUPABASE_URL = 'https://pqujtthiwbqizcjppean.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxdWp0dGhpd2JxaXpjanBwZWFuIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDU4OTEwOCwiZXhwIjoyMDkwMTY1MTA4fQ.MJKNPmabNAkZlhkQU11CSQtdR2tHbTArU10oEKgHQuY';
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyOY7WrGPrPCUoVp6DAfaxo36ZKG1mL7vR6KJ4z6PYNiRmp9VNs-gBoDgqfcMy0FPDZBA/exec';
const BASE_APP_URL = 'https://k5610018-satoshin.github.io/quest-app/';
const SUBJECTS = ['国語','算数','理科','社会','体育','音楽','道徳','総合','図工','家庭科','外国語','学活','行事'];

// ============================================================
// API Layer
// ============================================================
async function supaGet(table, params = '') {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=*${params}`, {
    headers: { 'Authorization': `Bearer ${SUPABASE_KEY}`, 'apikey': SUPABASE_KEY }
  });
  if (!res.ok) throw new Error(`${table}: HTTP ${res.status}`);
  return res.json();
}

async function supaUpdate(table, id, data) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
    method: 'PATCH',
    headers: {
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'apikey': SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify(data)
  });
  if (!res.ok) throw new Error(`PATCH ${table}: HTTP ${res.status}`);
}

async function gasAddComment(targetType, targetId, comment) {
  try {
    await fetch(GAS_URL + '?action=addComment', {
      method: 'POST',
      body: JSON.stringify({ targetType, targetId, comment }),
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      redirect: 'follow'
    });
  } catch (e) {
    console.warn('GAS転記エラー（バックグラウンド）:', e);
  }
}

// ============================================================
// State
// ============================================================
let DB = { users: [], diaries: [], reflections: [], matrix_records: [], skill_tree: [], acquired_items: [], weekly_reviews: [] };
let currentTab = 'dashboard';
let selectedStudentId = null;
let selectedSubject = null;

// Sort state
let diarySortKey = 'date';
let diarySortAsc = false;
let refSortKey = 'date';
let refSortAsc = false;
let refViewMode = 'card';
let missingPeriod = '';
let missingSubject = '';

// Newsletter check state (localStorage)
const NL_DIARY_KEY = 'nl_checked_diaries';
const NL_REF_KEY = 'nl_checked_reflections';
function getCheckedDiaries() { try { return JSON.parse(localStorage.getItem(NL_DIARY_KEY) || '[]'); } catch { return []; } }
function getCheckedRefs() { try { return JSON.parse(localStorage.getItem(NL_REF_KEY) || '[]'); } catch { return []; } }
function setCheckedDiaries(arr) { localStorage.setItem(NL_DIARY_KEY, JSON.stringify(arr)); updateNewsletterBadge(); }
function setCheckedRefs(arr) { localStorage.setItem(NL_REF_KEY, JSON.stringify(arr)); updateNewsletterBadge(); }

function toggleDiaryCheck(id) {
  const arr = getCheckedDiaries();
  const sid = String(id);
  const idx = arr.indexOf(sid);
  if (idx >= 0) arr.splice(idx, 1); else arr.push(sid);
  setCheckedDiaries(arr);
}

function toggleRefCheck(id) {
  const arr = getCheckedRefs();
  const sid = String(id);
  const idx = arr.indexOf(sid);
  if (idx >= 0) arr.splice(idx, 1); else arr.push(sid);
  setCheckedRefs(arr);
}

function updateNewsletterBadge() {
  const total = getCheckedDiaries().length + getCheckedRefs().length;
  const badge = document.getElementById('newsletterBadge');
  if (badge) {
    badge.textContent = total;
    badge.style.display = total > 0 ? '' : 'none';
  }
}

// ============================================================
// Init
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      currentTab = t.dataset.tab;
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      render();
    });
  });
  updateNewsletterBadge();
  refreshAll();
});

async function refreshAll() {
  const bar = document.getElementById('loadingBar');
  bar.classList.add('active');
  try {
    const [users, diaries, reflections, matrix_records, skill_tree, acquired_items, weekly_reviews] = await Promise.all([
      supaGet('users', '&order=student_number.asc'),
      supaGet('diaries', '&order=created_at.desc'),
      supaGet('reflections', '&order=created_at.desc'),
      supaGet('matrix_records', '&order=created_at.desc'),
      supaGet('skill_tree'),
      supaGet('acquired_items'),
      supaGet('weekly_reviews', '&order=created_at.desc')
    ]);
    DB = { users, diaries, reflections, matrix_records, skill_tree, acquired_items, weekly_reviews };
    document.getElementById('lastUpdate').textContent = '更新: ' + new Date().toLocaleTimeString('ja-JP');
    updateMissingBadge();
    updateNewsletterBadge();
    render();
    bar.classList.remove('active');
  } catch (e) {
    bar.classList.remove('active');
    showToast('データ取得エラー: ' + e.message, 'error');
    console.error(e);
  }
}

// ============================================================
// Render Router
// ============================================================
function render() {
  const el = document.getElementById('mainContent');
  switch (currentTab) {
    case 'dashboard': el.innerHTML = renderDashboard(); break;
    case 'diary': el.innerHTML = renderDiary(); break;
    case 'reflection': el.innerHTML = renderReflection(); break;
    case 'matrix': el.innerHTML = renderMatrixTab(); setTimeout(drawAdminMatrixCanvases, 50); break;
    case 'analysis': el.innerHTML = renderAnalysis(); break;
    case 'student': el.innerHTML = renderStudentDetail(); setTimeout(drawAdminMatrixCanvases, 50); break;
    case 'proxy': el.innerHTML = renderProxy(); break;
    case 'newsletter': el.innerHTML = renderNewsletter(); break;
    case 'missing': el.innerHTML = renderMissing(); break;
    case 'pdf': el.innerHTML = renderPDF(); break;
    case 'tokens': el.innerHTML = renderTokens(); break;
    case 'export': el.innerHTML = renderExport(); break;
  }
}

// ============================================================
// Helpers
// ============================================================
function getStudent(id) { return DB.users.find(u => u.student_id === id || u.id === id); }
function getStudentName(id) { const u = getStudent(id); return u ? u.name : '不明'; }
function getStudentNum(id) { const u = getStudent(id); return u ? u.student_number : '?'; }
function fmtDate(d) { if (!d) return '-'; const dt = new Date(d); return `${dt.getMonth()+1}/${dt.getDate()}`; }
function fmtDateTime(d) { if (!d) return '-'; const dt = new Date(d); return `${dt.getMonth()+1}/${dt.getDate()} ${dt.getHours()}:${String(dt.getMinutes()).padStart(2,'0')}`; }
function todayStr() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function escHtml(s) { if (!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.className = 'toast toast-' + type + ' show';
  t.textContent = msg;
  setTimeout(() => t.classList.remove('show'), 3000);
}

function updateMissingBadge() {
  const { missingDiary, missingReflection } = getMissing();
  const total = missingDiary.length + missingReflection.length;
  const badge = document.getElementById('missingBadge');
  badge.textContent = total;
  badge.style.display = total > 0 ? '' : 'none';
}

function getMissing() {
  const today = todayStr();
  const todayDiaryIds = new Set(DB.diaries.filter(d => d.created_at && d.created_at.startsWith(today)).map(d => d.student_id));
  const todayRefIds = new Set(DB.reflections.filter(r => r.created_at && r.created_at.startsWith(today)).map(r => r.student_id));
  const missingDiary = DB.users.filter(u => !todayDiaryIds.has(u.student_id) && !todayDiaryIds.has(u.id));
  const missingReflection = DB.users.filter(u => !todayRefIds.has(u.student_id) && !todayRefIds.has(u.id));
  return { missingDiary, missingReflection };
}

function clearFilter() {
  selectedStudentId = null;
  render();
}

function toggleCommentInput(cardId) {
  const area = document.getElementById(cardId + '-area');
  if (!area) return;
  const isHidden = area.style.display === 'none';
  area.style.display = isHidden ? 'block' : 'none';
  if (isHidden) {
    const textarea = document.getElementById(cardId);
    if (textarea) textarea.focus();
  }
}

function activeFilterHtml() {
  const studentOpts = DB.users.map(u => {
    const sid = getStudentId(u);
    return `<option value="${sid}" ${selectedStudentId === sid ? 'selected' : ''}>${u.student_number}番 ${escHtml(u.name)}</option>`;
  }).join('');
  return `
    <select onchange="selectStudent(this.value || null);this.blur()" style="padding:4px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:12px;min-width:140px">
      <option value="">全員表示</option>
      ${studentOpts}
    </select>
    ${selectedStudentId ? `<button class="btn btn-sm btn-outline" onclick="clearFilter()">✕ 解除</button>` : ''}
  `;
}

function selectStudent(studentId) {
  selectedStudentId = studentId || null;
  render();
}

function getZoneClass(zone) {
  if (!zone) return '';
  const z = zone.toLowerCase();
  if (z.includes('コンフォート') || z.includes('comfort')) return 'zone-comfort';
  if (z.includes('ストレッチ') || z.includes('stretch')) return 'zone-stretch';
  if (z.includes('パニック') || z.includes('panic')) return 'zone-panic';
  return '';
}

function getStudentId(u) { return u.student_id || u.id; }

function sortArrow(currentKey, targetKey, asc) {
  if (currentKey !== targetKey) return '';
  return `<span class="sort-arrow">${asc ? '▲' : '▼'}</span>`;
}

// ============================================================
// 1. Dashboard
// ============================================================
function renderDashboard() {
  const today = todayStr();
  const diaryCountMap = {};
  const refCountMap = {};
  DB.diaries.forEach(d => { const sid = d.student_id; diaryCountMap[sid] = (diaryCountMap[sid] || 0) + 1; });
  DB.reflections.forEach(r => { const sid = r.student_id; refCountMap[sid] = (refCountMap[sid] || 0) + 1; });

  const todayDiaries = DB.diaries.filter(d => d.created_at && d.created_at.startsWith(today));
  const todayRefs = DB.reflections.filter(r => r.created_at && r.created_at.startsWith(today));
  const todayDiaryIds = new Set(todayDiaries.map(d => d.student_id));
  const todayRefIds = new Set(todayRefs.map(r => r.student_id));
  const uncommentedDiaries = DB.diaries.filter(d => !d.teacher_comment && d.content);
  const uncommentedRefs = DB.reflections.filter(r => !r.teacher_comment && r.content);
  const starredRefs = DB.reflections.filter(r => r.star_rating && r.star_rating > 0);

  // --- 全体統計 ---
  const statsHtml = `
    <div class="stats-row">
      <div class="stat-box"><div class="stat-val">${DB.users.length}</div><div class="stat-label">児童数</div></div>
      <div class="stat-box"><div class="stat-val">${todayDiaries.length}</div><div class="stat-label">今日の日記</div></div>
      <div class="stat-box"><div class="stat-val">${todayRefs.length}</div><div class="stat-label">今日の振り返り</div></div>
      <div class="stat-box"><div class="stat-val">${uncommentedDiaries.length + uncommentedRefs.length}</div><div class="stat-label">未コメント</div></div>
      <div class="stat-box"><div class="stat-val">${DB.diaries.length} / ${DB.reflections.length}</div><div class="stat-label">日記/振返 累計</div></div>
      <div class="stat-box"><div class="stat-val">${starredRefs.length}</div><div class="stat-label">星つき振返</div></div>
    </div>
  `;

  // --- 今日のアクティビティ ---
  const todayAll = [...todayDiaries.map(d => ({type:'📝',name:getStudentName(d.student_id),num:getStudentNum(d.student_id),time:d.created_at,label:'日記',preview:(d.content||'').slice(0,40)})),
                     ...todayRefs.map(r => ({type:'🔄',name:getStudentName(r.student_id),num:getStudentNum(r.student_id),time:r.created_at,label:r.subject||'振返',preview:(r.content||'').slice(0,40)}))
  ].sort((a,b) => (b.time||'').localeCompare(a.time||''));

  const activityHtml = todayAll.length > 0
    ? todayAll.slice(0,12).map(a => `<div style="display:flex;gap:6px;align-items:baseline;padding:3px 0;border-bottom:1px solid var(--border);font-size:12px">
        <span>${a.type}</span>
        <span style="font-weight:700;min-width:90px">${a.num}番 ${escHtml(a.name)}</span>
        <span class="chip active" style="font-size:10px;padding:0 6px">${escHtml(a.label)}</span>
        <span style="color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(a.preview)}</span>
        <span style="color:var(--text2);font-size:10px">${fmtDateTime(a.time).split(' ')[1] || ''}</span>
      </div>`).join('')
    : '<div style="color:var(--text2);padding:10px;text-align:center">今日はまだ投稿がありません</div>';

  // --- 未提出（時間目・教科別フィルタ対応） ---
  const missingDiary = DB.users.filter(u => !todayDiaryIds.has(getStudentId(u)));

  // 振り返り: 時間目or教科で絞り込んだ未提出
  let filteredTodayRefs = todayRefs;
  let missingRefLabel = '振返未提出';
  if (missingPeriod) {
    filteredTodayRefs = todayRefs.filter(r => r.period === missingPeriod);
    missingRefLabel = missingPeriod + '時間目 未提出';
  }
  if (missingSubject) {
    filteredTodayRefs = filteredTodayRefs.filter(r => r.subject === missingSubject);
    missingRefLabel = (missingPeriod ? missingPeriod + '時間目 ' : '') + missingSubject + ' 未提出';
  }
  const filteredRefIds = new Set(filteredTodayRefs.map(r => r.student_id));
  const missingRef = DB.users.filter(u => !filteredRefIds.has(getStudentId(u)));

  const periodChips = ['1','2','3','4','5','6'].map(p =>
    `<span class="chip${missingPeriod===p?' active':''}" onclick="missingPeriod=missingPeriod==='${p}'?'':'${p}';render()" style="font-size:10px;padding:1px 8px">${p}時間目</span>`
  ).join('');
  const subjectChipsMissing = SUBJECTS.slice(0,8).map(s =>
    `<span class="chip${missingSubject===s?' active':''}" onclick="missingSubject=missingSubject==='${s}'?'':'${s}';render()" style="font-size:10px;padding:1px 8px">${s}</span>`
  ).join('');

  const missingHtml = `
    <div style="margin-bottom:8px">
      <span style="font-weight:600;font-size:12px">📝 日記未提出 (${missingDiary.length})</span>
      ${missingDiary.length === 0 ? '<span style="color:var(--success);font-size:12px;margin-left:8px">全員OK</span>'
        : `<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:4px">${missingDiary.map(u =>
          `<span class="missing-chip" style="font-size:11px;padding:2px 6px">${u.student_number} ${escHtml(u.name)}</span>`).join('')}</div>`}
    </div>
    <div>
      <div style="font-weight:600;font-size:12px;margin-bottom:4px">🔄 ${escHtml(missingRefLabel)} (${missingRef.length}/${DB.users.length})</div>
      <div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px">${periodChips}</div>
      <div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px">${subjectChipsMissing}</div>
      ${missingRef.length === 0 ? '<div style="color:var(--success);font-size:12px">全員提出済み！</div>'
        : `<div style="display:flex;flex-wrap:wrap;gap:3px">${missingRef.map(u =>
          `<span class="missing-chip" style="font-size:11px;padding:2px 6px">${u.student_number} ${escHtml(u.name)}</span>`).join('')}</div>`}
    </div>`;

  // --- 未コメント（先生が返信していない直近5件） ---
  const recentUncommented = [...uncommentedDiaries.map(d => ({type:'📝',id:d.id,name:getStudentName(d.student_id),num:getStudentNum(d.student_id),date:d.created_at,preview:(d.content||'').slice(0,50)})),
                              ...uncommentedRefs.map(r => ({type:'🔄',id:r.id,name:getStudentName(r.student_id),num:getStudentNum(r.student_id),date:r.created_at,preview:(r.content||'').slice(0,50)}))
  ].sort((a,b) => (b.date||'').localeCompare(a.date||'')).slice(0,8);

  const uncommentedHtml = recentUncommented.length > 0
    ? recentUncommented.map(u => `<div style="display:flex;gap:6px;align-items:baseline;padding:3px 0;border-bottom:1px solid var(--border);font-size:12px">
        <span>${u.type}</span>
        <span style="font-weight:700;min-width:80px">${u.num}番 ${escHtml(u.name)}</span>
        <span style="color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(u.preview)}</span>
        <span style="color:var(--text2);font-size:10px">${fmtDate(u.date)}</span>
      </div>`).join('')
    : '<div style="color:var(--success);padding:8px;text-align:center;font-size:12px">全てコメント済み！</div>';

  // --- 児童カード ---
  const cardsHtml = DB.users.map(u => {
    const sid = getStudentId(u);
    const dCount = diaryCountMap[sid] || 0;
    const rCount = refCountMap[sid] || 0;
    const streak = u.streak || u.login_streak || 0;
    const didToday = todayDiaryIds.has(sid) || todayRefIds.has(sid);
    return `
      <div class="student-card" onclick="selectedStudentId='${sid}';currentTab='student';document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));render()">
        <div class="sc-top">
          <div class="sc-num" style="${didToday ? 'background:var(--success)' : ''}">${u.student_number || '?'}</div>
          <div>
            <div class="sc-name">${escHtml(u.name)}</div>
            <div class="sc-lv">Lv.${u.level || 1} / ${u.exp || 0} EXP</div>
          </div>
        </div>
        <div class="sc-stats">
          <span><span class="val">${dCount}</span>日記</span>
          <span><span class="val">${rCount}</span>振返</span>
          <span><span class="val">${u.total_submissions || (dCount + rCount)}</span>提出</span>
        </div>
        <div class="sc-streak ${streak >= 3 ? 'hot' : 'cold'}">
          ${streak >= 3 ? '🔥' : '📝'} ストリーク: ${streak}日
        </div>
      </div>`;
  }).join('');

  return `${statsHtml}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
      <div class="card">
        <div class="card-header"><h3 style="font-size:13px;font-weight:700">📋 今日のアクティビティ (${todayAll.length}件)</h3></div>
        <div class="card-body" style="max-height:280px;overflow-y:auto;padding:8px 12px">${activityHtml}</div>
      </div>
      <div class="card">
        <div class="card-header"><h3 style="font-size:13px;font-weight:700">⚠️ 未提出</h3></div>
        <div class="card-body" style="padding:8px 12px">${missingHtml}</div>
      </div>
    </div>
    <div class="card" style="margin-bottom:12px">
      <div class="card-header"><h3 style="font-size:13px;font-weight:700">💬 未コメント (${recentUncommented.length}件)</h3></div>
      <div class="card-body" style="padding:8px 12px">${uncommentedHtml}</div>
    </div>
    <h3 style="font-size:13px;font-weight:700;margin-bottom:6px">👤 児童一覧 <span style="font-size:11px;color:var(--text2);font-weight:400">（クリックで日記タブへ）</span></h3>
    <div class="grid-4">${cardsHtml}</div>
  `;
}

// ============================================================
// 2. Diary (table view + checkbox + sort + inline comment)
// ============================================================
function sortDiaries(arr) {
  const sorted = [...arr];
  sorted.sort((a, b) => {
    let cmp = 0;
    if (diarySortKey === 'date') {
      cmp = (a.created_at || '').localeCompare(b.created_at || '');
    } else if (diarySortKey === 'name') {
      const na = getStudentNum(a.student_id);
      const nb = getStudentNum(b.student_id);
      cmp = (na === '?' ? 999 : Number(na)) - (nb === '?' ? 999 : Number(nb));
    }
    return diarySortAsc ? cmp : -cmp;
  });
  return sorted;
}

function toggleDiarySort(key) {
  if (diarySortKey === key) {
    diarySortAsc = !diarySortAsc;
  } else {
    diarySortKey = key;
    diarySortAsc = key === 'name';
  }
  render();
}

function renderDiary() {
  let diaries = [...DB.diaries];
  if (selectedStudentId) {
    diaries = diaries.filter(d => d.student_id === selectedStudentId);
  }
  diaries = sortDiaries(diaries);
  const checkedIds = getCheckedDiaries();

  if (diaries.length === 0) {
    return `<div class="filter-bar">${activeFilterHtml()}</div><div style="color:var(--text2);text-align:center;padding:30px">日記がありません</div>`;
  }

  const sortBar = `
    <div class="filter-bar">
      ${activeFilterHtml()}
      <span style="color:var(--text2);font-size:12px">${diaries.length}件</span>
      <button class="btn btn-sm btn-outline" onclick="toggleDiarySort('date')">日付順 ${sortArrow(diarySortKey,'date',diarySortAsc)}</button>
      <button class="btn btn-sm btn-outline" onclick="toggleDiarySort('name')">名前順 ${sortArrow(diarySortKey,'name',diarySortAsc)}</button>
    </div>
  `;

  const cardsHtml = diaries.map((d, idx) => {
    const cmt = d.teacher_comment || '';
    const isChecked = checkedIds.includes(String(d.id));
    const cardId = 'dc-' + idx;

    return `
      <div class="entry-card">
        <div class="ec-header">
          <span>
            <input type="checkbox" class="ec-checkbox" ${isChecked ? 'checked' : ''} onchange="toggleDiaryCheck('${d.id}');render()">
            <span class="ec-name">${getStudentNum(d.student_id)}番 ${escHtml(getStudentName(d.student_id))}</span>
          </span>
          <span class="ec-date">${fmtDateTime(d.created_at)}</span>
        </div>
        <div class="ec-content" onclick="toggleCommentInput('${cardId}')" style="cursor:pointer">${escHtml(d.content)}</div>
        ${cmt ? `<div class="ec-existing">💬 ${escHtml(cmt)}</div>` : ''}
        <div class="ec-comment-area" id="${cardId}-area" style="display:none">
          <div class="ec-input-row">
            <textarea id="${cardId}" rows="1" placeholder="${cmt ? '新しいコメントで上書き...' : 'コメントを入力...'}">${cmt ? '' : ''}</textarea>
            <button onclick="saveDiaryCommentCard('${d.id}','${cardId}',this)">${cmt ? '更新' : '送信'}</button>
          </div>
        </div>
      </div>`;
  }).join('');

  return `${sortBar}<div class="grid-3">${cardsHtml}</div>`;
}

async function saveDiaryComment(id) {
  const inp = document.getElementById('dc-' + id);
  const msg = document.getElementById('ds-' + id);
  if (!inp) return;
  const comment = inp.value.trim();
  try {
    await supaUpdate('diaries', id, { teacher_comment: comment });
    const d = DB.diaries.find(x => String(x.id) === String(id));
    if (d) d.teacher_comment = comment;
    if (msg) { msg.style.display = 'inline'; setTimeout(() => { msg.style.display = 'none'; }, 2000); }
    showToast('日記コメントを保存しました');
    gasAddComment('diary', id, comment);
  } catch (e) {
    showToast('保存エラー: ' + e.message, 'error');
  }
}

async function saveDiaryCommentCard(diaryId, textareaId, btn) {
  const textarea = document.getElementById(textareaId);
  if (!textarea) return;
  const comment = textarea.value.trim();
  if (!comment) { showToast('コメントを入力してください', 'error'); return; }
  const oldText = btn.textContent;
  btn.textContent = '...';
  btn.disabled = true;
  try {
    await supaUpdate('diaries', diaryId, { teacher_comment: comment });
    const d = DB.diaries.find(x => String(x.id) === String(diaryId));
    if (d) d.teacher_comment = comment;
    gasAddComment('diary', diaryId, comment);
    showToast('コメントを保存しました');
    render();
  } catch (e) {
    showToast('保存エラー: ' + e.message, 'error');
  }
  btn.textContent = oldText;
  btn.disabled = false;
}

// ============================================================
// 3. Reflection (table view + checkbox + sort + no comment input)
// ============================================================
function sortRefs(arr) {
  const sorted = [...arr];
  sorted.sort((a, b) => {
    let cmp = 0;
    if (refSortKey === 'date') {
      cmp = (a.created_at || '').localeCompare(b.created_at || '');
    } else if (refSortKey === 'name') {
      const na = getStudentNum(a.student_id);
      const nb = getStudentNum(b.student_id);
      cmp = (na === '?' ? 999 : Number(na)) - (nb === '?' ? 999 : Number(nb));
    } else if (refSortKey === 'subject') {
      cmp = (a.subject || '').localeCompare(b.subject || '');
    }
    return refSortAsc ? cmp : -cmp;
  });
  return sorted;
}

function toggleRefSort(key) {
  if (refSortKey === key) {
    refSortAsc = !refSortAsc;
  } else {
    refSortKey = key;
    refSortAsc = key === 'name' || key === 'subject';
  }
  render();
}

function renderReflection() {
  let refs = [...DB.reflections];
  if (selectedStudentId) {
    refs = refs.filter(r => r.student_id === selectedStudentId);
  }
  if (selectedSubject) {
    refs = refs.filter(r => r.subject === selectedSubject);
  }
  refs = sortRefs(refs);
  const checkedIds = getCheckedRefs();

  const subjectChips = `
    <div class="chip-bar">
      <div class="chip ${!selectedSubject ? 'active' : ''}" onclick="setSubjectFilter(null)">全て</div>
      ${SUBJECTS.map(s => `<div class="chip ${selectedSubject === s ? 'active' : ''}" onclick="setSubjectFilter('${s}')">${s}</div>`).join('')}
    </div>
  `;

  // matrix map
  const matrixMap = {};
  DB.matrix_records.forEach(m => {
    if (m.reflection_id) matrixMap[m.reflection_id] = m;
  });

  const viewMode = refViewMode || 'card';

  // View toggle
  const viewToggle = `
    <div class="view-toggle">
      <button class="${viewMode === 'card' ? 'active' : ''}" onclick="refViewMode='card';render()">📋 カード</button>
      <button class="${viewMode === 'table' ? 'active' : ''}" onclick="refViewMode='table';render()">📊 テーブル</button>
    </div>
  `;

  if (viewMode === 'table') {
    // テーブル表示（従来）
    const rowsHtml = refs.length === 0

async function saveRefComment(refId, textareaId, btn) {
  const textarea = document.getElementById(textareaId);
  if (!textarea) return;
  const comment = textarea.value.trim();
  if (!comment) { showToast('コメントを入力してください', 'error'); return; }
  const oldText = btn.textContent;
  btn.textContent = '...';
  btn.disabled = true;
  try {
    await supaUpdate('reflections', refId, { teacher_comment: comment });
    const r = DB.reflections.find(x => String(x.id) === String(refId));
    if (r) r.teacher_comment = comment;
    gasAddComment('reflection', refId, comment);
    showToast('コメントを保存しました');
    render();
  } catch (e) {
    showToast('保存エラー: ' + e.message, 'error');
  }
  btn.textContent = oldText;
  btn.disabled = false;
}

const ZONE_MAP = {
  'パワーアップ':'月','グングン':'月','ドキドキ':'月',
  '学びが生まれる':'星','キラキラ':'星','ジーン':'星',
  '人も自分も笑顔':'太陽','ニコニコ':'太陽','ウキウキ':'太陽',
  'ダラダラ':'花畑','フワフワ':'花畑','ホッコリ':'花畑',
  'たいくつ・どんより':'沼',
  '不安・寂しい':'ブラックホール','ドロドロ':'ブラックホール',
  '人も自分もイヤな顔':'曇','モヤモヤ':'曇',
  'イライラ':'雷',
  '中心':'地球'
};
function convertZone(name) {
  if (!name) return name;
  if (name.includes('→')) return name.split('→').map(z => ZONE_MAP[z.trim()] || z.trim()).join('→');
  return ZONE_MAP[name] || name;
}
function getZoneType(zone) {
  const z = convertZone(zone);
  if (!z) return 'mid';
  const pos = ['月','星','太陽'];
  const neg = ['沼','ブラックホール','曇','雷'];
  if (pos.includes(z)) return 'pos';
  if (neg.includes(z)) return 'neg';
  return 'mid';
}

function drawAdminMatrixCanvases() {
  const records = (() => {
    if (currentTab === 'matrix') {
      let r = [...DB.matrix_records];
      if (selectedStudentId) r = r.filter(m => m.student_id === selectedStudentId);
      r.sort((a,b) => (b.created_at||'').localeCompare(a.created_at||''));
      return r;
    }
    if (currentTab === 'student' && selectedStudentId) {
      return DB.matrix_records.filter(m => m.student_id === selectedStudentId)
        .sort((a,b) => (b.created_at||'').localeCompare(a.created_at||''));
    }
    return [];
  })();

  document.querySelectorAll('.admin-matrix-canvas').forEach(canvas => {
    const idx = parseInt(canvas.dataset.midx);
    const m = records[idx];
    if (!m) return;
    let points;
    try { points = JSON.parse(m.points_json || '[]'); } catch { points = []; }
    if (points.length === 0) return;

    const wrap = canvas.parentElement;
    const rect = wrap.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    const ctx = canvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const w = rect.width, h = rect.height;

    if (points.length >= 2) {
      ctx.beginPath();
      ctx.moveTo(points[0].px * w / 100, points[0].py * h / 100);
      for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].px * w / 100, points[i].py * h / 100);
      ctx.strokeStyle = 'rgba(99,102,241,0.6)';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
    points.forEach((p, i) => {
      const x = p.px * w / 100, y = p.py * h / 100;
      const t = i / Math.max(points.length - 1, 1);
      ctx.beginPath();
      ctx.arc(x, y, 5, 0, Math.PI * 2);
      ctx.fillStyle = `rgb(${Math.round(99+t*140)},${Math.round(102-t*40)},${Math.round(241-t*100)})`;
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    });
  });
}

function toggleProxyFields() {
  const type = document.getElementById('proxy-type').value;
  document.getElementById('proxy-ref-fields').style.display = type === 'reflection' ? 'block' : 'none';
}

async function submitProxy() {
  const type = document.getElementById('proxy-type').value;
  const studentId = document.getElementById('proxy-student').value;
  const content = document.getElementById('proxy-content').value.trim();

  if (!studentId) return showToast('児童を選択してください', 'error');
  if (!content) return showToast('内容を入力してください', 'error');

  const btn = document.getElementById('proxy-submit');
  btn.disabled = true;
  btn.textContent = '送信中...';

  try {
    const data = { studentId, content };
    if (type === 'reflection') {
      const subject = document.getElementById('proxy-subject').value;
      const plan = document.getElementById('proxy-plan').value.trim();
      if (!subject) { showToast('教科を選択してください', 'error'); btn.disabled = false; btn.textContent = '送信'; return; }
      data.subject = subject;
      data.plan = plan;
      data.period = '';
    }

    // GAS API経由で投稿（EXP・型検出・スキルツリー等の処理はGAS側で行う）
    const action = type === 'diary' ? 'submitDiary' : 'submitReflection';
    const res = await fetch(GAS_URL + '?action=' + action, {
      method: 'POST',
      body: JSON.stringify(data),
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      redirect: 'follow'
    });
    const result = await res.json();

    if (result.success) {
      showToast('代筆投稿しました！');
      const status = document.getElementById('proxy-status');
      if (status) { status.style.display = 'inline'; setTimeout(() => { status.style.display = 'none'; }, 3000); }
      document.getElementById('proxy-content').value = '';
      if (type === 'reflection') {
        document.getElementById('proxy-plan').value = '';
      }
      // データ再取得
      refreshAll();
    } else {
      showToast('エラー: ' + (result.error || '不明'), 'error');
    }
  } catch (e) {
    showToast('通信エラー: ' + e.message, 'error');
  }
  btn.disabled = false;
  btn.textContent = '送信';
}

function printItems(items, title, filterDesc) {
  if (items.length === 0) { showToast('該当するデータがありません', 'error'); return; }
  let html = `<h2>${title}</h2><p style="font-size:11px;color:#666;margin-bottom:12px">${filterDesc} (${items.length}件)</p>`;
  items.forEach(item => {
    const name = `${getStudentNum(item.student_id)}番 ${getStudentName(item.student_id)}`;
    const date = fmtDateTime(item.created_at);
    const subjectLabel = item.subject ? ` [${item.subject}]` : '';
    const starLabel = item.star_rating ? ' ⭐'.repeat(item.star_rating) : '';
    html += `<div class="print-entry">
      <div class="pe-header"><span>${escHtml(name)}${escHtml(subjectLabel)}${starLabel}</span><span>${date}</span></div>
      ${item.plan ? `<div style="font-size:11px;color:#166534;margin-bottom:2px">計画: ${escHtml(item.plan)}</div>` : ''}
      <div class="pe-body">${escHtml(item.content)}</div>
      ${item.teacher_comment ? `<div class="pe-comment">💬 ${escHtml(item.teacher_comment)}</div>` : ''}
    </div>`;
  });
  openPrintWindow(title, html);
}

function applyDateFilter(items, fromId, toId) {
  const from = document.getElementById(fromId).value;
  const to = document.getElementById(toId).value;
  if (from) items = items.filter(i => i.created_at && i.created_at >= from);
  if (to) items = items.filter(i => i.created_at && i.created_at <= to + 'T23:59:59');
  return { items, from, to };
}

function applyCommentFilter(items, filterId) {
  const f = document.getElementById(filterId).value;
  if (f === 'starred') items = items.filter(i => i.star_rating && i.star_rating > 0);
  if (f === 'uncommented') items = items.filter(i => !i.teacher_comment);
  if (f === 'commented') items = items.filter(i => i.teacher_comment);
  return { items, filterLabel: f === 'starred' ? '星つき' : f === 'uncommented' ? '未コメント' : f === 'commented' ? 'コメント済' : '' };
}

function printDiary() {
  const studentId = document.getElementById('pdf-d-student').value;
  let items = [...DB.diaries];
  if (studentId) items = items.filter(i => i.student_id === studentId);
  const { items: dated, from, to } = applyDateFilter(items, 'pdf-d-from', 'pdf-d-to');
  const { items: filtered, filterLabel } = applyCommentFilter(dated, 'pdf-d-filter');
  const desc = [studentId ? getStudentName(studentId) : '全員', from ? `${from}〜` : '', to ? `〜${to}` : '', filterLabel].filter(Boolean).join(' / ');

function printReflection() {

  navigator.clipboard.writeText(url).then(() => {

    btn.textContent = 'OK';
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = 'コピー'; }, 1500);
  });
}

function copyAllTokens() {
  const lines = DB.users.map(u => {
    const token = u.access_token || u.token || '';
    const url = token ? `${BASE_APP_URL}?token=${token}` : '';
    return `${u.student_number}\t${u.name}\t${url}`;

  navigator.clipboard.writeText(lines).then(() => {
    showToast('全URLをコピーしました');

}

      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <h3 style="font-size:14px;font-weight:700">📊 テーブル別件数</h3>
      </div>
      <div class="card-body">
        <table class="token-table">
          <thead><tr><th>テーブル</th><th>件数</th></tr></thead>
          <tbody>
            ${Object.entries(DB).map(([k, v]) => `<tr><td style="font-weight:600">${k}</td><td>${v.length}</td></tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function exportJSON() {
  const output = {
    exported_at: new Date().toISOString(),
    summary: {
      users: DB.users.length,
      diaries: DB.diaries.length,
      reflections: DB.reflections.length,
      matrix_records: DB.matrix_records.length,
      skill_tree: DB.skill_tree.length,
      acquired_items: DB.acquired_items.length,
      weekly_reviews: DB.weekly_reviews.length
    },
    data: DB
  };
  document.getElementById('jsonOutput').value = JSON.stringify(output, null, 2);
  showToast('JSONを生成しました');
}

function copyJSON() {
  const ta = document.getElementById('jsonOutput');
  if (!ta.value) { exportJSON(); }
  navigator.clipboard.writeText(ta.value).then(() => showToast('JSONをコピーしました'));
}

function downloadJSON() {
  const ta = document.getElementById('jsonOutput');
  if (!ta.value) { exportJSON(); }
  const blob = new Blob([ta.value], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `quest-data-${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('ダウンロードしました');
}
</script>
</body>
</html>
