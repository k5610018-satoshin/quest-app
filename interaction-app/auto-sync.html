<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>担任記録 — 自動同期</title>
<style>
  body { font-family: 'メイリオ', system-ui, sans-serif; max-width: 800px; margin: 24px auto; padding: 0 16px; color: #222; line-height: 1.5; }
  h1 { font-size: 20px; }
  pre { background: #f4f4f4; padding: 12px; border-radius: 4px; font-size: 12px; max-height: 400px; overflow: auto; }
  .ok { color: #2a7; font-weight: bold; }
  .err { color: #c33; font-weight: bold; }
  .info { color: #357abd; font-weight: bold; }
  .step { padding: 8px; margin: 4px 0; background: #fafafa; border-left: 4px solid #ccc; }
  .step.ok { border-left-color: #2a7; }
  .step.err { border-left-color: #c33; }
  .step.run { border-left-color: #357abd; background: #e8f4fc; }
</style>
</head>
<body>
<h1>🔄 担任記録 完全双方向同期 (L1↔L2↔L3)</h1>
<p>このページを開くだけで、L1(localStorage) ↔ L3(クラウドGAS) の双方向差分を同期し、L2(IndexedDB)も最新化します。SWキャッシュ非依存。</p>

<div id="steps"></div>

<h2>結果</h2>
<pre id="result">処理中…</pre>

<p><a href="index.html">▶ 担任記録アプリを開く</a> | <a href="diagnostic.html">📊 診断レポート</a></p>

<script>
const STORAGE_KEY = 'interactionApp_v1';
const SYNC_KEY = 'interactionApp_gasSync';
const LAST_PULL_KEY = 'interactionApp_lastPull';
// F1修正: 個人版GAS資格情報のハードコード削除。設定済み(localStorage)からのみ取得。
// 配布版では各先生がsetup-gas.htmlでGAS設定を入れる前提。

const stepsEl = document.getElementById('steps');
const resultEl = document.getElementById('result');
const log = { steps: [], result: {} };

function step(label, kind = 'run') {
  const el = document.createElement('div');
  el.className = 'step ' + kind;
  el.textContent = label;
  stepsEl.appendChild(el);
  log.steps.push({ label, kind, ts: new Date().toISOString() });
  return el;
}

(async () => {
  try {
    const cfg = JSON.parse(localStorage.getItem(SYNC_KEY) || '{}');
    const ep = cfg.endpoint;
    const ak = cfg.apiKey;
    if (!ep || !ak) {
      step('❌ クラウド同期設定が未入力', 'err');
      resultEl.textContent = 'クラウド同期未設定です。\n\nアプリの「⚙ 設定」タブ → クラウド同期(GAS) で\nWebアプリURLとAPI_KEYを入力してから再度開いてください。\n配布版の場合は setup-gas.html でセットアップウィザードを開けます。';
      return;
    }
    step('1. ローカル localStorage を読み込み中…');
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    const localCounts = {
      records: (data.records || []).length,
      praises: (data.praises || []).length,
      evaluations: (data.evaluations || []).length,
      abaRecords: (data.abaRecords || []).length,
      ketebureRecords: (data.ketebureRecords || []).length,
      seatingSnapshots: (data.seatingSnapshots || []).length
    };
    const localTotal = Object.values(localCounts).reduce((a, b) => a + b, 0);
    step(`✓ ローカル: ${localTotal}件 (記録 ${localCounts.records} / ほめ ${localCounts.praises} / 評価 ${localCounts.evaluations} / ABA ${localCounts.abaRecords} / けテ ${localCounts.ketebureRecords})`, 'ok');
    log.result.local = localCounts;

    step('2. クラウドGASから全レコード取得中…');
    const pullUrl = ep + '?key=' + encodeURIComponent(ak) + '&since=2000-01-01T00:00:00.000Z&dataType=all&deviceId=auto-sync-page';
    const r1 = await fetch(pullUrl);
    if (!r1.ok) throw new Error('HTTP ' + r1.status);
    const cloud = await r1.json();
    if (!cloud.ok) throw new Error('GAS error: ' + cloud.error);

    const cloudCounts = {
      records: (cloud.records || []).length,
      praises: (cloud.praises || []).length,
      evaluations: (cloud.evaluations || []).length,
      abaRecords: (cloud.abaRecords || []).length,
      ketebureRecords: (cloud.ketebureRecords || []).length,
      seatingSnapshots: (cloud.seatingSnapshots || cloud.seating || []).length
    };
    const cloudTotal = Object.values(cloudCounts).reduce((a, b) => a + b, 0);
    step(`✓ クラウド: ${cloudTotal}件 (記録 ${cloudCounts.records} / ほめ ${cloudCounts.praises} / 評価 ${cloudCounts.evaluations} / ABA ${cloudCounts.abaRecords} / けテ ${cloudCounts.ketebureRecords})`, 'ok');
    log.result.cloud = cloudCounts;

    step('3. クラウドのID集合を構築中…');
    const cloudIds = new Set();
    // L1修正: 各キーごとに独立に処理 (cloud.seating誤フォールバック削除)
    ['records', 'praises', 'evaluations', 'abaRecords', 'ketebureRecords'].forEach(k => {
      (cloud[k] || []).forEach(x => x && x.id && cloudIds.add(x.id));
    });
    // 席替え: GAS応答は seatingSnapshots か(古い場合)seatingで返す
    (cloud.seatingSnapshots || cloud.seating || []).forEach(x => x && x.id && cloudIds.add(x.id));
    step(`✓ クラウドID集合: ${cloudIds.size}個`, 'ok');

    step('4a. ローカル only レコード(L1にあるがL3に無い)を特定中…');
    const types = [
      { key: 'records', dataType: null, payloadKey: 'records', label: '交友関係' },
      { key: 'praises', dataType: 'praise', payloadKey: 'praises', label: 'ほめ' },
      { key: 'evaluations', dataType: 'evaluation', payloadKey: 'evaluations', label: '評価' },
      { key: 'abaRecords', dataType: 'aba', payloadKey: 'abaRecords', label: 'ABA' },
      { key: 'ketebureRecords', dataType: 'ketebure', payloadKey: 'ketebureRecords', label: 'けテぶれ' }
    ];
    const localOnly = {};
    let totalToPush = 0;
    for (const t of types) {
      const arr = (data[t.key] || []).filter(x => x && x.id && !cloudIds.has(x.id));
      localOnly[t.label] = arr;
      totalToPush += arr.length;
    }
    step(`✓ ローカルonly合計: ${totalToPush}件 (` + Object.entries(localOnly).map(([k, v]) => `${k} ${v.length}`).join(' / ') + ')', totalToPush > 0 ? 'ok' : 'info');
    log.result.localOnly = Object.fromEntries(Object.entries(localOnly).map(([k, v]) => [k, v.length]));

    step('4b. クラウド only レコード(L3にあるがL1に無い)を特定中…');
    const localIds = {};
    for (const t of types) {
      localIds[t.key] = new Set((data[t.key] || []).map(x => x && x.id).filter(Boolean));
    }
    const cloudOnly = {};
    let totalToPull = 0;
    for (const t of types) {
      const arr = (cloud[t.key] || []).filter(x => x && x.id && String(x.deleted) !== '1' && !localIds[t.key].has(x.id));
      cloudOnly[t.label] = arr;
      totalToPull += arr.length;
    }
    step(`✓ クラウドonly合計: ${totalToPull}件 (` + Object.entries(cloudOnly).map(([k, v]) => `${k} ${v.length}`).join(' / ') + ')', totalToPull > 0 ? 'ok' : 'info');
    log.result.cloudOnly = Object.fromEntries(Object.entries(cloudOnly).map(([k, v]) => [k, v.length]));

    if (totalToPush === 0) {
      step('5a. push対象なし → スキップ', 'info');
    } else {
      step(`5a. クラウドへ push (${totalToPush}件)…`);
      const pushed = {};
      for (const t of types) {
        const arr = localOnly[t.label];
        if (arr.length === 0) { pushed[t.label] = 0; continue; }
        const body = { action: 'bulk_add', deviceId: 'auto-sync-page' };
        if (t.dataType) body.dataType = t.dataType;
        body[t.payloadKey] = arr;
        try {
          const r = await fetch(ep + '?key=' + encodeURIComponent(ak), {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(body)
          });
          const dd = await r.json();
          if (!dd.ok) throw new Error(dd.error || 'GAS error');
          pushed[t.label] = '+' + (dd.added || 0) + '件 (重複skip ' + (dd.skipped || 0) + ')';
          step(`  ${t.label}: ${pushed[t.label]}`, 'ok');
        } catch (e) {
          pushed[t.label] = 'ERR: ' + e.message;
          step(`  ${t.label}: ERR ${e.message}`, 'err');
        }
      }
      log.result.pushed = pushed;
    }

    if (totalToPull === 0) {
      step('5b. pull対象なし → スキップ', 'info');
    } else {
      step(`5b. ローカルへ pull (${totalToPull}件)…`);
      const pulled = {};
      for (const t of types) {
        const arr = cloudOnly[t.label];
        if (arr.length === 0) { pulled[t.label] = 0; continue; }
        // ローカル配列に追加 (deleted=1は既にfilter済)
        if (!Array.isArray(data[t.key])) data[t.key] = [];
        // パース必要なフィールドの正規化
        for (const item of arr) {
          if (typeof item.aspects === 'string') { try { item.aspects = JSON.parse(item.aspects); } catch (_) { item.aspects = []; } }
          if (typeof item.behaviors === 'string') { try { item.behaviors = JSON.parse(item.behaviors); } catch (_) { item.behaviors = [item.behaviors]; } }
          if (typeof item.evidences === 'string') { try { item.evidences = JSON.parse(item.evidences); } catch (_) { item.evidences = []; } }
        }
        data[t.key].push(...arr);
        pulled[t.label] = '+' + arr.length + '件';
        step(`  ${t.label}: ${pulled[t.label]}`, 'ok');
      }
      // L1 (localStorage) にマージ結果を即書き込み
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        step('  ✓ L1 localStorage 更新完了', 'ok');
      } catch (e) {
        step('  ✗ L1 localStorage 更新失敗: ' + e.message, 'err');
      }
      log.result.pulled = pulled;
    }

    step('6. IndexedDB 同期 (ローカル localStorage → IDB)…');
    // F3修正: localStorage が空 or 異常に小さいとき IDB 上書きを禁止 (過去BU保護)
    const localJsonNow = localStorage.getItem(STORAGE_KEY);
    let idbWriteOk = false;
    if (!localJsonNow) {
      step('  ⚠ localStorage が空のためIDB書き込みをスキップ (過去BU保護)', 'err');
    } else if (localJsonNow.length < 100) {
      step(`  ⚠ localStorage が異常に小さい(${localJsonNow.length}文字)ためIDB書き込みをスキップ (過去BU保護)`, 'err');
    } else if (window.indexedDB) {
      await new Promise((resolve) => {
        const req = indexedDB.open('interactionApp', 1);
        req.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains('appState')) db.createObjectStore('appState');
        };
        req.onsuccess = () => {
          const db = req.result;
          try {
            const tx = db.transaction(['appState'], 'readwrite');
            tx.objectStore('appState').put({ ts: new Date().toISOString(), json: localJsonNow }, 'current');
            tx.oncomplete = () => { idbWriteOk = true; step(`  ✓ IDB書き込み完了 (${localJsonNow.length}文字)`, 'ok'); resolve(); };
            tx.onerror = () => { step('  ✗ IDB書き込み失敗: ' + (tx.error && tx.error.message), 'err'); resolve(); };
          } catch (e) {
            step('  ✗ IDB tx失敗: ' + e.message, 'err');
            resolve();
          }
        };
        req.onerror = () => { step('  ✗ IDB open失敗: ' + (req.error && req.error.message), 'err'); resolve(); };
      });
    } else {
      step('  ✗ IndexedDB利用不可', 'err');
    }

    step('6b. IDB 件数検証 (書き込み後の実態確認)…');
    if (window.indexedDB) {
      await new Promise((resolve) => {
        const req = indexedDB.open('interactionApp', 1);
        req.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains('appState')) db.createObjectStore('appState');
        };
        req.onsuccess = () => {
          const db = req.result;
          const r = db.transaction(['appState'], 'readonly').objectStore('appState').get('current');
          r.onsuccess = () => {
            const v = r.result;
            if (!v || !v.json) { step('  ✗ IDBから読み出せず', 'err'); resolve(); return; }
            try {
              const idbData = JSON.parse(v.json);
              const idbCounts = {
                records: (idbData.records||[]).length,
                praises: (idbData.praises||[]).length,
                evaluations: (idbData.evaluations||[]).length,
                aba: (idbData.abaRecords||[]).length,
                kete: (idbData.ketebureRecords||[]).length
              };
              const idbTotal = Object.values(idbCounts).reduce((a,b)=>a+b,0);
              step(`  ✓ IDB現在: 合計${idbTotal}件 (記録${idbCounts.records} / ほめ${idbCounts.praises} / 評価${idbCounts.evaluations} / ABA${idbCounts.aba} / けテ${idbCounts.kete}) ts=${v.ts}`, 'ok');
              log.result.idbAfter = { total: idbTotal, ...idbCounts, ts: v.ts };
            } catch (e) { step('  ✗ IDB parse失敗: ' + e.message, 'err'); }
            resolve();
          };
          r.onerror = () => { step('  ✗ IDB get失敗', 'err'); resolve(); };
        };
        req.onerror = () => { step('  ✗ IDB open失敗', 'err'); resolve(); };
      });
    }

    step('7. クラウド最新件数を再取得 (deleted=1除く生存数)…');
    // info API は deleted=1 を含む raw row数なので、再fetch all して生存数で比較
    const r2 = await fetch(ep + '?key=' + encodeURIComponent(ak) + '&since=2000-01-01T00:00:00.000Z&dataType=all&deviceId=auto-sync-final');
    const cloudFinal = await r2.json();
    const cloudAliveCounts = {};
    let cloudAliveTotal = 0;
    for (const t of types) {
      const arr = (cloudFinal[t.key] || []).filter(x => x && x.id && String(x.deleted) !== '1');
      cloudAliveCounts[t.label] = arr.length;
      cloudAliveTotal += arr.length;
    }
    log.result.cloudAlive = { total: cloudAliveTotal, ...cloudAliveCounts };
    step(`✓ クラウド生存件数(deleted=1除く): 合計${cloudAliveTotal}件 (` + Object.entries(cloudAliveCounts).map(([k,v])=>`${k} ${v}`).join(' / ') + ')', 'ok');

    // 参考: info APIの raw row数 (deleted含む)
    const r3 = await fetch(ep + '?key=' + encodeURIComponent(ak) + '&action=info');
    const info = await r3.json();
    log.result.cloudInfo = info;
    const cloudInfoTotal = (info.total_rows||0) + (info.praise_rows||0) + (info.eval_rows||0) + (info.aba_rows||0) + (info.ketebure_rows||0);
    step(`  (参考) info APIの raw row数: 合計${cloudInfoTotal}件 (deleted=1含む)`, 'info');

    // L1 最新件数も再計測
    const finalLocal = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    const finalLocalTotal = (finalLocal.records||[]).length + (finalLocal.praises||[]).length + (finalLocal.evaluations||[]).length + (finalLocal.abaRecords||[]).length + (finalLocal.ketebureRecords||[]).length;
    step(`✓ L1 最終件数: 合計${finalLocalTotal}件`, 'ok');

    // 3層整合チェック (生存数ベース)
    const idbTotal = log.result.idbAfter ? log.result.idbAfter.total : '?';
    const allMatch = (finalLocalTotal === idbTotal) && (finalLocalTotal === cloudAliveTotal);
    step(allMatch ? `🎉 3層完全一致: L1=L2=L3=${finalLocalTotal}件` : `⚠ 3層差: L1=${finalLocalTotal} / L2=${idbTotal} / L3生存=${cloudAliveTotal}`, allMatch ? 'ok' : 'err');

    step('🎉 完全双方向同期完了', 'ok');
    document.title = (allMatch ? '✅' : '⚠') + ' 双方向同期完了 - 担任記録';
    resultEl.textContent = JSON.stringify(log, null, 2);

    // 結果を localStorage に保存して外部から確認できるように
    try {
      localStorage.setItem('interactionApp_autosync_lastResult', JSON.stringify({
        ts: new Date().toISOString(),
        url: location.href,
        log: log
      }));
    } catch (_) {}

  } catch (e) {
    step('❌ エラー: ' + e.message, 'err');
    document.title = '❌ 同期失敗 - 担任記録';
    resultEl.textContent = 'ERROR: ' + e.message + '\n\n' + JSON.stringify(log, null, 2);
    try {
      localStorage.setItem('interactionApp_autosync_lastResult', JSON.stringify({
        ts: new Date().toISOString(),
        error: e.message,
        log: log
      }));
    } catch (_) {}
  }
})();
</script>
</body>
</html>
