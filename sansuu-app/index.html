<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#3B7DD8">
<title>算数 自由進度</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ============================================================ -->
<!-- 1) 番号ログイン画面 (showLogin/hideLogin で切替) -->
<!-- ============================================================ -->
<div id="loginScreen" class="login-screen">
  <h1>5年4組　算数　自由進度</h1>
  <p class="login-prompt">出席番号をえらんでね</p>
  <div id="numberGrid" class="number-grid"></div>
  <p style="margin-top:24px;font-size:13px;color:#888;">
    うまく動かないとき：<a href="?reset=1" style="color:#3B7DD8;">リセットしてやり直す</a>
  </p>
</div>

<!-- ============================================================ -->
<!-- 2) メインアプリ (ログイン後に表示) -->
<!-- ============================================================ -->
<div id="mainApp" class="main-app" hidden>

  <!-- ヘッダ：単元情報・進度・現在地 -->
  <header class="app-header">
    <div class="header-left">
      <button class="logout-btn" id="logoutBtn" title="番号えらびに戻る">←</button>
      <span class="student-badge" id="studentBadge">No.--</span>
      <select class="unit-select" id="unitSelect" aria-label="単元を選ぶ"></select>
    </div>
    <div class="header-right">
      <span class="progress-summary" id="progressSummary">◎0 ○0 △0</span>
      <span class="progress-bar-mini">
        <span class="progress-bar-fill" id="progressBarFill" style="width:0%"></span>
      </span>
      <span class="sync-badge" id="syncBadge" title="同期状態">☁</span>
    </div>
  </header>

  <!-- タブナビ -->
  <nav class="tabs" id="tabNav">
    <button class="tab-btn active" data-tab="manual">📖 手引き</button>
    <button class="tab-btn" data-tab="today">📅 きょう</button>
    <button class="tab-btn" data-tab="reflect">📝 振り返り</button>
  </nav>

  <!-- ====================================================== -->
  <!-- タブ1：進度表（樋口式 学習計画表） -->
  <!-- ====================================================== -->
  <section class="tab-content active" data-tab-content="manual">
    <div class="manual-header">
      <h2 class="unit-name" id="manualUnitName">単元名</h2>
      <p class="unit-meta">
        <span id="manualUnitHours">--時間</span>
        <span id="manualUnitPages">--</span>
      </p>
    </div>

    <div class="legend-bar">
      <span class="legend-x">× わからない</span>
      <span class="legend-tri">△ 理解できた</span>
      <span class="legend-circ">○ 自力でとけた</span>
      <span class="legend-dbl">◎ せつめいできた</span>
      <span class="legend-tc">⭐ 先生にせつめい</span>
    </div>

    <div class="progress-table-wrap">
      <table class="progress-table" id="progressTable">
        <thead id="progressTableHead"></thead>
        <tbody id="progressTableBody"></tbody>
      </table>
    </div>
  </section>

  <!-- ====================================================== -->
  <!-- タブ2：きょう（ホーム＝カレンダー＋カード） -->
  <!-- ====================================================== -->
  <section class="tab-content" data-tab-content="today">
    <div class="today-header">
      <button class="date-nav" id="dateNavPrev">◀</button>
      <span class="today-label" id="todayLabel">きょう</span>
      <button class="date-nav" id="dateNavNext">▶</button>
    </div>

    <div class="day-cards" id="dayCards">
      <!-- 動的生成：今日±2日の5枚 -->
    </div>
  </section>

  <!-- ====================================================== -->
  <!-- タブ3：振り返り -->
  <!-- ====================================================== -->
  <section class="tab-content" data-tab-content="reflect">
    <h2 class="section-title">きょうの ふりかえり</h2>

    <div class="reflect-form">
      <div class="form-row">
        <label>取り組んだページ</label>
        <select id="reflectItem" aria-label="どのページをやった？"></select>
      </div>

      <div class="form-row">
        <label>どこまでできた？（樋口式 4段階）</label>
        <div class="status-grp btn-grp" data-target="reflectStatus">
          <button type="button" data-value="dbl" class="status-dbl">◎ せつめいできた</button>
          <button type="button" data-value="circ" class="status-circ">○ 自力でとけた</button>
          <button type="button" data-value="tri" class="status-tri">△ 理解できた</button>
          <button type="button" data-value="x" class="status-x-btn">× わからない</button>
        </div>
        <input type="hidden" id="reflectStatus" value="">
      </div>

      <div class="form-row">
        <label>なぜそうなった？（あてはまるものぜんぶ）</label>
        <div class="reason-grp" id="reasonTags">
          <button type="button" data-value="集中できた">集中できた</button>
          <button type="button" data-value="作戦どおりにできた">作戦どおりにできた</button>
          <button type="button" data-value="友達と話せた">友達と話せた</button>
          <button type="button" data-value="ヒントが効いた">ヒントが効いた</button>
          <button type="button" data-value="時間が足りない">時間が足りない</button>
          <button type="button" data-value="むずかしかった">むずかしかった</button>
          <button type="button" data-value="ちがう作戦が必要">ちがう作戦が必要</button>
          <button type="button" data-value="集中できなかった">集中できなかった</button>
        </div>
        <input type="text" id="reflectReasonFree" class="free-input" placeholder="自分のことばで（あれば）">
      </div>

      <div class="form-row">
        <label>つぎ どうする？</label>
        <div class="strategy-grp btn-grp" data-target="reflectStrategy">
          <button type="button" data-value="もう一回">もう一回</button>
          <button type="button" data-value="新しい作戦">新しい作戦</button>
          <button type="button" data-value="次にすすむ">次にすすむ</button>
          <button type="button" data-value="教えてもらう">教えてもらう</button>
        </div>
        <input type="hidden" id="reflectStrategy" value="">
        <input type="text" id="reflectStrategyFree" class="free-input" placeholder="作戦を書いてみよう（あれば）">
      </div>

      <div class="form-row submit-row">
        <button class="submit-btn" id="submitReflectBtn">📝 きろくする</button>
      </div>
    </div>
  </section>

  <!-- フッタ：上位層対応の常設導線 -->
  <footer class="action-footer">
    <button class="action-btn" data-action="help">❓ ヘルプ</button>
    <button class="action-btn" data-action="teach">👫 教えに行く</button>
    <button class="action-btn" data-action="self_problem">★ 自作問題</button>
    <button class="action-btn" data-action="strategy_text">✏ 攻略文</button>
  </footer>

  <!-- トースト -->
  <div id="toast" class="toast" hidden></div>

  <!-- ヘルプモーダル -->
  <div id="helpModal" class="modal" hidden>
    <div class="modal-content">
      <header class="modal-header">
        <span>こまったときは…</span>
        <button class="close-btn" id="helpCloseBtn">×</button>
      </header>
      <div class="modal-body">
        <ol class="help-steps" id="helpStepsList"></ol>
        <div class="help-ask">
          <p>それでもこまったら：</p>
          <button class="ask-teacher-btn" id="askTeacherBtn">🙋 先生に質問</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 4段階評価ピッカー -->
  <div id="statusPickerModal" class="modal" hidden>
    <div class="modal-content status-picker-modal">
      <header class="modal-header">
        <span id="statusPickerTitle">どこまでできた？</span>
        <button class="close-btn" id="statusPickerCloseBtn">×</button>
      </header>
      <div class="modal-body">
        <p class="status-picker-context" id="statusPickerContext"></p>
        <div class="status-picker-grid" id="statusPickerGrid"></div>
      </div>
    </div>
  </div>

  <!-- カード学習モーダル -->
  <div id="cardLearningModal" class="modal" hidden>
    <div class="modal-content card-learning">
      <header class="modal-header">
        <span id="cardLearningTitle">カード学習</span>
        <button class="close-btn" id="cardLearningCloseBtn">×</button>
      </header>
      <div class="modal-body">
        <div class="card-progress" id="cardProgress">1 / 1</div>
        <div class="study-card" id="studyCard">
          <div class="study-card-face front" id="cardFront">
            <p class="card-q" id="cardQuestion"></p>
            <button class="card-flip-btn" id="cardFlipBtn">めくる →</button>
          </div>
          <div class="study-card-face back" id="cardBack" hidden>
            <p class="card-a" id="cardAnswer"></p>
            <p class="card-hint" id="cardHint"></p>
            <div class="card-self-eval">
              <p>自分の評価：</p>
              <div class="status-picker-grid" id="cardStatusGrid"></div>
            </div>
          </div>
        </div>
        <div class="card-nav">
          <button id="cardPrevBtn">← 前</button>
          <button id="cardNextBtn">次 →</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 教えに行く モーダル -->
  <div id="teachModal" class="modal" hidden>
    <div class="modal-content">
      <header class="modal-header">
        <span>👫 教えに行く</span>
        <button class="close-btn" id="teachCloseBtn">×</button>
      </header>
      <div class="modal-body">
        <p>だれに教えた？（番号をタップ）</p>
        <div id="teachTargetGrid" class="number-grid"></div>
        <p style="margin-top:12px;">なにを教えた？</p>
        <input type="text" id="teachContent" class="free-input" placeholder="例：小数のかけ算のふでざんのコツ">
        <div class="submit-row">
          <button class="submit-btn" id="teachSubmitBtn">きろくする</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="data/unit_master.js"></script>
<script src="data/prompts.js"></script>
<script src="cloud-sync.js"></script>
<script src="idb-storage.js"></script>
<script src="app.js"></script>
</body>
</html>
